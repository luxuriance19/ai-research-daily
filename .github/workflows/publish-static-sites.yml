name: Publish static AI digest

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: static-ai-digest
  cancel-in-progress: false

jobs:
  build-static:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Reject committed credentials
        run: node automation/check-no-secrets.mjs --tracked
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore bounded collector state and caches
        uses: actions/cache@v4
        with:
          path: |
            work/mechanism-watch/audit.json
            work/mechanism-watch/cache
            work/model-compute-source-probe/audit.json
            work/model-compute-source-probe/cache
            work/tech-discovery-probe/audit.json
            work/tech-discovery-probe/cache
            work/top3-evidence-dossier/cache
            data/source-quality-latest.json
            public-pages/archive
          key: daily-intelligence-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            daily-intelligence-${{ runner.os }}-
      - name: Run fast daily path (48 discovery endpoints to Top 3)
        run: npm run daily:fast
        env:
          OUTPUT_PATH: data/latest.json
          SKIP_INGEST: "1"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public-pages
      - uses: actions/upload-artifact@v4
        with:
          name: frontier-signals-static
          path: public-pages
      - name: Upload silent audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: frontier-signals-audit
          path: |
            work/unified-top3-replay/audit.json
            work/unified-top3-replay/review.md
            work/top3-evidence-dossier/audit.json
            work/top3-evidence-dossier/review.md
            work/fast-daily/run.json
            data/source-quality-latest.json
            data/source-role-review-latest.json
            data/source-role-review-latest.md
          if-no-files-found: error
          retention-days: 30

  deploy-github-pages:
    needs: build-static
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudflare-pages:
    if: ${{ vars.CLOUDFLARE_ENABLED == 'true' }}
    needs: build-static
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Ensure Cloudflare Pages project exists
        run: npm run ensure:cloudflare-pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: frontier-signals-ai-daily
      - uses: actions/download-artifact@v4
        with:
          name: frontier-signals-static
          path: public-pages
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public-pages --project-name frontier-signals-ai-daily --branch main
