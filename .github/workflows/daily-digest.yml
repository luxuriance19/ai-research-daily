name: Manual AI digest verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-ai-digest
  cancel-in-progress: false

jobs:
  verify-static:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Reject committed credentials
        run: node automation/check-no-secrets.mjs --tracked
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-formula.txt
      - run: python -m pip install --requirement requirements-formula.txt
      - run: npm ci
      - run: npm run daily:fast
      - name: Reject credentials in generated verification artifacts
        run: >-
          node automation/check-no-secrets.mjs --paths
          public-pages
          work/unified-top3-replay/audit.json
          work/top3-evidence-dossier/audit.json
          work/fast-daily/run.json
      - uses: actions/upload-artifact@v4
        with:
          name: manually-verified-ai-digest
          path: |
            public-pages
            work/unified-top3-replay/audit.json
            work/top3-evidence-dossier/audit.json
            work/fast-daily/run.json
          if-no-files-found: error
          retention-days: 14
